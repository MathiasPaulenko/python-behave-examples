[behave]
paths = features
default_format = progress
# -- Formatters: each line is one formatter, paired with outfiles by position --
# Add or remove lines to try different report libraries.
# Outfiles are relative to this file's directory (project root).
format = pretty
    json
    modern
    steps
    rjson
    cucumber
    markdown
    stepcatalog

outfiles = reports/pretty.txt
    reports/results.json
    reports/behave_modern_html_report.html
    reports/step_catalog.html
    reports/results_rjson.json
    reports/results_cucumber.json
    reports/results_markdown.md
    reports/step_catalog.md

color = true
show_timings = true
junit = true
junit_directory = reports/junit
default_tags = not @wip

# -- Formatter registrations --
[behave.formatters]
modern = behave_modern_html_report.formatter:ModernHTMLFormatter
steps = behave_modern_html_report.step_catalog_formatter:StepCatalogFormatter
rjson = behave_modern_json_report:ModernJSONFormatter
cucumber = behave_modern_json_report:CucumberJSONFormatter
markdown = behave_modern_md_report.formatter:BehaveMarkdownFormatter
stepcatalog = behave_modern_md_report.step_catalog_formatter:StepCatalogMarkdownFormatter

# Console formatter
modern-console = behave_modern_console_report.formatters.modern:ModernFormatter
modern-live = behave_modern_console_report.formatters.modern_live:ModernLiveFormatter
progress = behave_modern_console_report.formatters.progress:ProgressFormatter
log = behave_modern_console_report.formatters.log:LogFormatter
ci = behave_modern_console_report.formatters.ci:CIFormatter
minimal = behave_modern_console_report.formatters.minimal:MinimalFormatter

# -- CUSTOM PARAMS --
# userdata section: accessible via context.config.userdata
[behave.userdata]
api_url = http://localhost:5000
app_start_timeout = 5

# Behave Modern JSON Report custom params
mjr.project_name = My Project
mjr.branch = dev
mjr.team = qa
mjr.environment = staging
mjr.build_id = 42
